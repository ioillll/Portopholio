<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHANG YANG | Portfolio</title>
    <style>
        /* 基础样式重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* 纵向滚动容器 */
        .container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
        }

        /* 横向滚动容器 */
        .h-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow-x: scroll;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
        }
        .h-container::-webkit-scrollbar { display: none; }

        .h-slide {
            flex: 0 0 100vw; 
            height: 100vh;
            scroll-snap-align: start;
        }

        /* 媒体全屏铺满与画廊展示 */
        .bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .artwork {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            display: block;
            padding-top: 100px;    
            padding-bottom: 120px; 
            padding-left: 20px;
            padding-right: 20px;
        }

        /* 文字叠加层 */
        .overlay {
            position: absolute;
            bottom: 50px;
            left: 50px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none; 
        }
        .overlay h2 {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .overlay p {
            font-size: 11px;           
            font-weight: 300;          
            letter-spacing: 0.1em;     
            margin-top: 8px;           
            color: rgba(255, 255, 255, 0.7); 
            text-transform: capitalize; 
        }

        /* 交互提示按钮样式 */
        .hint-wrapper {
            position: absolute;
            bottom: 50px;
            right: 50px;
            z-index: 20; 
        }

        .scroll-hint {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            cursor: pointer; 
            pointer-events: auto; 
            transition: opacity 0.3s;
        }
        .scroll-hint:hover { opacity: 0.7; }

        /* 动画效果 */
        .hint-down { animation: bounceDown 2s infinite; }
        @keyframes bounceDown {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(8px); opacity: 1; }
        }

        .hint-right { animation: bounceRight 2s infinite; }
        @keyframes bounceRight {
            0%, 100% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(8px); opacity: 1; }
        }

        .hint-top { animation: bounceUp 2s infinite; }
        @keyframes bounceUp {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-8px); opacity: 1; }
        }

        /* 固定导航栏 */
        nav {
            position: fixed;
            top: 40px;
            left: 50px;
            z-index: 100;
            pointer-events: none;
        }
        nav h1 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .menu {
            position: fixed;
            top: 40px;
            right: 50px;
            z-index: 100;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav>
        <h1>ZHANG YANG</h1>
    </nav>
    <div class="menu">Sato&Tamada Ken</div>

    <div class="container" id="main-container">
        
        <section id="section-1">
            <div class="overlay">
                <h2>01. Research: Vection in Depth</h2>
            </div>
            <div class="hint-wrapper">
                <div class="scroll-hint hint-down" id="btn-down">SCROLL DOWN ↓</div>
            </div>
            <video autoplay muted loop playsinline class="bg-video">
                <source src="images/vection_demo.mp4" type="video/mp4">
            </video>
        </section>

        <section id="section-2">
            <div class="overlay">
                <h2>02. Photography: 砂の風</h2>
                <p>A landscape photo collection about Kitakyushu</p>
            </div>
            
            <div class="hint-wrapper">
                <div class="scroll-hint hint-right btn-next">SWIPE RIGHT ➔</div>
                <div class="scroll-hint hint-down btn-next-section" style="display: none;">SCROLL DOWN ↓</div>
            </div>

            <div class="h-container">
                <div class="h-slide"><img src="images/1.jpg" class="artwork" loading="lazy" alt="Photo 1"></div>
                <div class="h-slide"><img src="images/2.jpg" class="artwork" loading="lazy" alt="Photo 2"></div>
                <div class="h-slide"><img src="images/3.jpg" class="artwork" loading="lazy" alt="Photo 3"></div>
                <div class="h-slide"><img src="images/4.jpg" class="artwork" loading="lazy" alt="Photo 4"></div>
                <div class="h-slide"><img src="images/5.jpg" class="artwork" loading="lazy" alt="Photo 5"></div>
            </div>
        </section>

        <section id="section-3">
            <div class="overlay">
                <h2>03. Visual Design & Event Poster</h2>
            </div>
            
            <div class="hint-wrapper">
                <div class="scroll-hint hint-right btn-next">SWIPE RIGHT ➔</div>
                <div class="scroll-hint hint-top btn-top" style="display: none;">BACK TO TOP ↑</div>
            </div>

            <div class="h-container">
                <div class="h-slide"><img src="images/a.png" class="artwork" loading="lazy" alt="Poster 1"></div>
                <div class="h-slide"><img src="images/b.png" class="artwork" loading="lazy" alt="Poster 2"></div>
                <div class="h-slide"><img src="images/c.png" class="artwork" loading="lazy" alt="Poster 3"></div>
                <div class="h-slide"><img src="images/d.png" class="artwork" loading="lazy" alt="Poster 4"></div>
                <div class="h-slide"><img src="images/z.png" class="artwork" loading="lazy" alt="Poster 5"></div>
                <div class="h-slide"><img src="images/e.png" class="artwork" loading="lazy" alt="Poster 6"></div>
                <div class="h-slide"><img src="images/f.png" class="artwork" loading="lazy" alt="Poster 7"></div>
            </div>
        </section>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainContainer = document.getElementById('main-container');
            const SCROLL_SPEED = 1200; 
            let isAnimating = false;   

            function customScroll(element, target, duration, isHorizontal = false) {
                if (isAnimating) return; 
                isAnimating = true;

                const start = isHorizontal ? element.scrollLeft : element.scrollTop;
                const distance = target - start;
                let startTime = null;

                const originalSnap = element.style.scrollSnapType;
                element.style.scrollSnapType = 'none';

                function easeInOutQuart(t) {
                    return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
                }

                function animation(currentTime) {
                    if (startTime === null) startTime = currentTime;
                    const timeElapsed = currentTime - startTime;
                    const progress = Math.min(timeElapsed / duration, 1);
                    const easeProgress = easeInOutQuart(progress);
                    
                    if (isHorizontal) {
                        element.scrollTo(start + distance * easeProgress, 0);
                    } else {
                        element.scrollTo(0, start + distance * easeProgress);
                    }

                    if (timeElapsed < duration) {
                        requestAnimationFrame(animation);
                    } else {
                        if (isHorizontal) element.scrollTo(target, 0);
                        else element.scrollTo(0, target);
                        
                        element.style.scrollSnapType = originalSnap;
                        isAnimating = false; 
                    }
                }
                requestAnimationFrame(animation);
            }

            // 1. SCROLL DOWN 按钮 (第一页)
            const btnDown = document.getElementById('btn-down');
            const section2 = document.getElementById('section-2');
            if(btnDown && section2) {
                btnDown.addEventListener('click', () => {
                    customScroll(mainContainer, section2.offsetTop, SCROLL_SPEED);
                });
            }

            // ================= 性能优化：使用 IntersectionObserver =================
            const observerOptions = {
                root: null,
                threshold: 0.1 
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const hContainer = entry.target.parentElement;
                    const section = hContainer.closest('section');
                    const btnNext = section.querySelector('.btn-next');
                    const btnTop = section.querySelector('.btn-top');
                    const btnNextSection = section.querySelector('.btn-next-section'); // 新增：获取向下按钮

                    if (entry.isIntersecting) {
                        // 滑到了最后一张图
                        if(btnNext) btnNext.style.display = 'none';   
                        if(btnTop) btnTop.style.display = 'block';   
                        if(btnNextSection) btnNextSection.style.display = 'block'; // 显示向下按钮
                    } else {
                        // 还没滑到最后一张图
                        if(btnNext) btnNext.style.display = 'block';  
                        if(btnTop) btnTop.style.display = 'none';    
                        if(btnNextSection) btnNextSection.style.display = 'none'; // 隐藏向下按钮
                    }
                });
            }, observerOptions);

            // 2. 绑定横向滑动与观察器
            const sectionsWithHScroll = document.querySelectorAll('#section-2, #section-3');
            sectionsWithHScroll.forEach(section => {
                const hContainer = section.querySelector('.h-container');
                const btnNext = section.querySelector('.btn-next');
                const btnTop = section.querySelector('.btn-top');
                const btnNextSection = section.querySelector('.btn-next-section'); // 新增：获取向下按钮
                
                const lastSlide = hContainer.lastElementChild;
                if (lastSlide) observer.observe(lastSlide);

                // 点击：向右滑动
                if (btnNext) {
                    btnNext.addEventListener('click', () => {
                        customScroll(hContainer, hContainer.scrollLeft + window.innerWidth, SCROLL_SPEED, true);
                    });
                }

                // 点击：返回顶部 (Section 3 用)
                if (btnTop) {
                    btnTop.addEventListener('click', () => {
                        customScroll(mainContainer, 0, SCROLL_SPEED);
                        setTimeout(() => {
                            hContainer.scrollTo({ left: 0 }); // 悄悄重置横向位置
                        }, SCROLL_SPEED + 100); 
                    });
                }

                // 点击：去下一页 (Section 2 用)
                if (btnNextSection) {
                    btnNextSection.addEventListener('click', () => {
                        const nextSection = section.nextElementSibling; // 自动获取下一个大板块
                        if (nextSection) {
                            customScroll(mainContainer, nextSection.offsetTop, SCROLL_SPEED);
                            setTimeout(() => {
                                hContainer.scrollTo({ left: 0 }); // 悄悄重置横向位置
                            }, SCROLL_SPEED + 100); 
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
